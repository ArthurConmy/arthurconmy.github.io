<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SWINGSHANK — swing your sentence</title>
<meta name="description" content="SWINGSHANK: a browser game. The ball and chain on your ankle is your burden and your only weapon. Survive the yard.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#1a1d23;
    --page:#111318;
    --paint:#9aa3b2;
    --sodium:#ffb84d;
    --alert:#e8503a;
    --stripe:#f2f2ee;
    --ink:#c9cfda;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--page);
    color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;
    padding:20px 12px 32px;
  }
  header{text-align:center;margin-bottom:14px}
  h1{
    font-family:"Saira Stencil One","Space Grotesk",sans-serif;
    font-weight:400;
    font-size:clamp(34px,7vw,58px);
    letter-spacing:.06em;
    color:var(--stripe);
    line-height:1;
    text-shadow:0 0 22px rgba(255,184,77,.25);
  }
  h1 .amp{color:var(--sodium)}
  .tag{
    margin-top:6px;
    font-size:14px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--paint);
  }
  #frame{
    position:relative;
    width:min(960px,100%);
    border:1px solid #2c313b;
    box-shadow:0 18px 60px rgba(0,0,0,.55);
    background:var(--asphalt);
  }
  canvas{display:block;width:100%;height:auto}
  .controls{
    margin-top:14px;
    font-size:14px;
    color:var(--paint);
    text-align:center;
    line-height:1.7;
  }
  .controls b{color:var(--stripe);font-weight:500}
  .controls .hot{color:var(--sodium)}
  footer{margin-top:22px;font-size:13px;color:#5c6472}
  footer a{color:var(--paint)}
  @media (prefers-reduced-motion: reduce){
    h1{text-shadow:none}
  }
</style>
</head>
<body>
<header>
  <h1>SWINGSHANK <span class="amp">&#9679;</span></h1>
  <div class="tag">swing your sentence</div>
</header>

<div id="frame"><canvas id="game" width="960" height="600"></canvas></div>

<p class="controls">
  <b>Arrows / WASD</b> run &nbsp;&middot;&nbsp; <b>Space</b> yank the chain &nbsp;&middot;&nbsp; <b>P</b> pause &nbsp;&middot;&nbsp; <b>M</b> mute<br>
  The ball only hurts guards while it <span class="hot">glows</span>. The chain blocks taser bolts. Stay out of the searchlights.
</p>

<footer><a href="/">arthurconmy.github.io</a> &mdash; an original game, built from scratch</footer>

<script>
(function(){
"use strict";

// ---------- setup ----------
var W = 960, H = 600;
var cv = document.getElementById("game");
var cx = cv.getContext("2d");
var DPR = Math.min(2, window.devicePixelRatio || 1);
cv.width = W * DPR; cv.height = H * DPR;
cx.setTransform(DPR, 0, 0, DPR, 0, 0);

var REDUCED = false;
try { REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch(e){}

// arena bounds (inside the fence)
var A = { x: 26, y: 26, w: W - 52, h: H - 52 };

// ---------- input ----------
var keys = {};
var pressedOnce = {};
function keyName(e){
  var k = e.key;
  if (k === "ArrowUp" || k === "w" || k === "W") return "up";
  if (k === "ArrowDown" || k === "s" || k === "S") return "down";
  if (k === "ArrowLeft" || k === "a" || k === "A") return "left";
  if (k === "ArrowRight" || k === "d" || k === "D") return "right";
  if (k === " ") return "yank";
  if (k === "Enter") return "enter";
  if (k === "p" || k === "P") return "pause";
  if (k === "m" || k === "M") return "mute";
  if (k === "r" || k === "R") return "restart";
  return null;
}
window.addEventListener("keydown", function(e){
  var n = keyName(e);
  if (!n) return;
  if (n === "up" || n === "down" || n === "left" || n === "right" || n === "yank") e.preventDefault();
  if (!keys[n]) pressedOnce[n] = true;
  keys[n] = true;
  initAudio();
});
window.addEventListener("keyup", function(e){
  var n = keyName(e);
  if (n) keys[n] = false;
});
function tapped(n){ var v = pressedOnce[n]; pressedOnce[n] = false; return !!v; }

// ---------- audio (tiny synth) ----------
var AC = null, master = null, muted = false;
function initAudio(){
  if (AC) { if (AC.state === "suspended") AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain();
    master.gain.value = 0.5;
    master.connect(AC.destination);
  } catch(e){ AC = null; }
}
function env(gainNode, t0, peak, dur){
  gainNode.gain.setValueAtTime(0.0001, t0);
  gainNode.gain.exponentialRampToValueAtTime(peak, t0 + 0.01);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
}
function tone(freq, dur, type, peak, slideTo){
  if (!AC || muted) return;
  var t0 = AC.currentTime;
  var o = AC.createOscillator(), g = AC.createGain();
  o.type = type || "square";
  o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  env(g, t0, peak || 0.2, dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function noiseHit(dur, peak, low){
  if (!AC || muted) return;
  var t0 = AC.currentTime;
  var len = Math.max(1, Math.floor(AC.sampleRate * dur));
  var buf = AC.createBuffer(1, len, AC.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
  var src = AC.createBufferSource(); src.buffer = buf;
  var g = AC.createGain();
  env(g, t0, peak || 0.3, dur);
  var f = AC.createBiquadFilter();
  f.type = "lowpass"; f.frequency.value = low || 900;
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t0);
}
var sfx = {
  smash: function(){ noiseHit(0.16, 0.5, 700); tone(90, 0.14, "sine", 0.5, 40); },
  clank: function(){ tone(2400, 0.05, "square", 0.08, 1400); noiseHit(0.05, 0.12, 3500); },
  whoosh: function(){ noiseHit(0.22, 0.16, 2200); },
  hurt: function(){ tone(220, 0.25, "sawtooth", 0.35, 70); },
  zap: function(){ tone(1600, 0.12, "sawtooth", 0.12, 300); },
  alarm: function(){ tone(620, 0.5, "square", 0.10, 620); setTimeout(function(){ tone(470, 0.5, "square", 0.10, 470); }, 240); },
  heart: function(){ tone(660, 0.1, "sine", 0.2); setTimeout(function(){ tone(990, 0.14, "sine", 0.2); }, 90); },
  over: function(){ tone(300, 0.7, "sawtooth", 0.25, 60); },
};

// ---------- helpers ----------
function rnd(a, b){ return a + Math.random() * (b - a); }
function clamp(v, a, b){ return v < a ? a : (v > b ? b : v); }
function dist(ax, ay, bx, by){ var dx = bx - ax, dy = by - ay; return Math.sqrt(dx*dx + dy*dy); }
function lerp(a, b, t){ return a + (b - a) * t; }

// ---------- game state ----------
var state = "title"; // title | play | over | pause
var player, ball, guards, bolts, parts, popups, pickups, trail;
var wave, waveBreak, spawnQueue, spawnTimer;
var score, combo, comboTimer, best, kills;
var shake, hitstop, spotted, tGlobal, bannerT, bannerText, overT;
var yankCd;

try { best = parseInt(localStorage.getItem("swingshank_best") || "0", 10) || 0; }
catch(e){ best = 0; }

var CHAIN_L = 105;      // rest length
var CHAIN_MAX = 1.55;   // hard cap multiplier
var LETHAL = 375;       // ball speed that hurts
var BALL_M = 2.6;

function reset(){
  player = { x: W/2, y: H/2 + 60, vx: 0, vy: 0, r: 15, hp: 3, inv: 0, face: 1 };
  ball = { x: W/2 - 70, y: H/2 + 90, vx: 0, vy: 0, r: 13 };
  guards = []; bolts = []; parts = []; popups = []; pickups = []; trail = [];
  wave = 0; waveBreak = 1.5; spawnQueue = []; spawnTimer = 0;
  score = 0; combo = 1; comboTimer = 0; kills = 0;
  shake = 0; hitstop = 0; spotted = false; tGlobal = 0;
  bannerT = 0; bannerText = ""; overT = 0; yankCd = 0;
}
reset();

// ---------- waves ----------
function buildWave(n){
  var q = [];
  var walkers = 3 + n * 2;
  var tasers = n >= 2 ? Math.floor(n / 1.5) : 0;
  var captains = n >= 4 ? Math.floor((n - 2) / 2) : 0;
  var i;
  for (i = 0; i < walkers; i++) q.push("walker");
  for (i = 0; i < tasers; i++) q.push("taser");
  for (i = 0; i < captains; i++) q.push("captain");
  // shuffle
  for (i = q.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = q[i]; q[i] = q[j]; q[j] = tmp;
  }
  return q;
}
function spawnGuard(type){
  var side = Math.floor(rnd(0, 4));
  var x, y;
  if (side === 0){ x = rnd(A.x, A.x + A.w); y = -30; }
  else if (side === 1){ x = rnd(A.x, A.x + A.w); y = H + 30; }
  else if (side === 2){ x = -30; y = rnd(A.y, A.y + A.h); }
  else { x = W + 30; y = rnd(A.y, A.y + A.h); }
  var g = { x: x, y: y, vx: 0, vy: 0, type: type, t: rnd(0, 6), flash: 0, aim: 0, tel: 0, cool: rnd(0.5, 1.5) };
  if (type === "walker"){ g.r = 15; g.hp = 1; g.spd = clamp(66 + wave * 4, 66, 150); }
  else if (type === "taser"){ g.r = 14; g.hp = 2; g.spd = clamp(58 + wave * 3, 58, 120); }
  else { g.r = 23; g.hp = 6; g.spd = 46; }
  guards.push(g);
}

// ---------- particles / popups ----------
function burst(x, y, color, n, speed){
  if (parts.length > 300) return;
  for (var i = 0; i < n; i++){
    var a = rnd(0, Math.PI * 2), s = rnd(speed * 0.3, speed);
    parts.push({ x: x, y: y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: rnd(0.25, 0.6), t: 0, c: color, r: rnd(1.5, 4) });
  }
}
function popup(x, y, text, color){
  popups.push({ x: x, y: y, text: text, c: color || "#f2f2ee", t: 0 });
}

// ---------- combat ----------
function killGuard(g, idx){
  var pts = g.type === "walker" ? 100 : (g.type === "taser" ? 150 : 400);
  pts *= combo;
  score += pts;
  kills++;
  popup(g.x, g.y - 20, "+" + pts + (combo > 1 ? "  x" + combo : ""), "#ffd23f");
  combo = Math.min(9, combo + 1);
  comboTimer = 1.4;
  burst(g.x, g.y, "#35507a", 14, 260);
  burst(g.x, g.y, "#ffd23f", 6, 200);
  if (player.hp < 3 && Math.random() < 0.10){
    pickups.push({ x: g.x, y: g.y, t: 0 });
  }
  guards.splice(idx, 1);
  sfx.smash();
  shake = Math.min(14, shake + 7);
  hitstop = 0.045;
}
function hurtPlayer(fx, fy){
  if (player.inv > 0 || state !== "play") return;
  player.hp--;
  player.inv = 1.4;
  sfx.hurt();
  shake = Math.min(18, shake + 12);
  burst(player.x, player.y, "#e8503a", 16, 240);
  var d = Math.max(1, dist(fx, fy, player.x, player.y));
  player.vx += (player.x - fx) / d * 320;
  player.vy += (player.y - fy) / d * 320;
  if (player.hp <= 0){
    state = "over"; overT = 0;
    sfx.over();
    if (score > best){
      best = score;
      try { localStorage.setItem("swingshank_best", String(best)); } catch(e){}
    }
  }
}

// ---------- searchlights ----------
var towers = [
  { x: A.x + 8, y: A.y + 8, base: 0.9, range: 0.55, speed: 0.5, phase: 0 },
  { x: A.x + A.w - 8, y: A.y + 8, base: Math.PI - 0.9, range: 0.55, speed: 0.42, phase: 2.1 }
];
function towerAngle(tw){ return tw.base + Math.sin(tGlobal * tw.speed + tw.phase) * tw.range; }
function inBeam(tw, px, py){
  var a = towerAngle(tw);
  var dx = px - tw.x, dy = py - tw.y;
  var d = Math.sqrt(dx*dx + dy*dy);
  if (d > 760 || d < 1) return false;
  var ang = Math.atan2(dy, dx);
  var diff = Math.abs(((ang - a + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
  return diff < 0.10;
}

// ---------- update ----------
function update(dt){
  tGlobal += dt;
  if (hitstop > 0){ hitstop -= dt; return; }

  // --- waves ---
  if (guards.length === 0 && spawnQueue.length === 0){
    waveBreak -= dt;
    if (waveBreak <= 0){
      wave++;
      spawnQueue = buildWave(wave);
      spawnTimer = 0;
      bannerT = 1.6; bannerText = "WAVE " + wave;
      sfx.alarm();
      waveBreak = 2.2; // breather granted after this wave is cleared
    }
  }
  if (spawnQueue.length > 0){
    spawnTimer -= dt;
    if (spawnTimer <= 0){
      spawnGuard(spawnQueue.shift());
      spawnTimer = clamp(0.9 - wave * 0.05, 0.35, 0.9);
    }
  }

  // --- spotlight check ---
  spotted = inBeam(towers[0], player.x, player.y) || inBeam(towers[1], player.x, player.y);

  // --- player movement ---
  var ax = 0, ay = 0;
  if (keys.left) ax -= 1;
  if (keys.right) ax += 1;
  if (keys.up) ay -= 1;
  if (keys.down) ay += 1;
  if (ax !== 0 || ay !== 0){
    var il = 1 / Math.sqrt(ax*ax + ay*ay);
    ax *= il; ay *= il;
    if (ax !== 0) player.face = ax > 0 ? 1 : -1;
  }
  var ACC = 1750, PDAMP = 7;
  player.vx += (ax * ACC - player.vx * PDAMP) * dt;
  player.vy += (ay * ACC - player.vy * PDAMP) * dt;

  // --- yank ---
  yankCd -= dt;
  if (tapped("yank") && state === "play" && yankCd <= 0){
    yankCd = 0.6;
    var dx = player.x - ball.x, dy = player.y - ball.y;
    var d = Math.max(1, Math.sqrt(dx*dx + dy*dy));
    ball.vx += dx / d * 640 + player.vx * 0.5;
    ball.vy += dy / d * 640 + player.vy * 0.5;
    player.vx -= dx / d * 90;
    player.vy -= dy / d * 90;
    sfx.whoosh();
    burst(ball.x, ball.y, "#9aa3b2", 5, 120);
  }

  // --- chain physics (substeps for stability) ---
  var steps = Math.max(1, Math.ceil(dt / (1/120)));
  var sdt = dt / steps;
  for (var s = 0; s < steps; s++){
    var ddx = ball.x - player.x, ddy = ball.y - player.y;
    var d2 = Math.max(1, Math.sqrt(ddx*ddx + ddy*ddy));
    var nx = ddx / d2, ny = ddy / d2;
    if (d2 > CHAIN_L){
      var stretch = d2 - CHAIN_L;
      var relv = (ball.vx - player.vx) * nx + (ball.vy - player.vy) * ny;
      var F = stretch * 90 + relv * 6;
      ball.vx -= nx * F / BALL_M * sdt;
      ball.vy -= ny * F / BALL_M * sdt;
      player.vx += nx * F * 0.22 * sdt;
      player.vy += ny * F * 0.22 * sdt;
    }
    // ball friction
    var bf = Math.pow(0.55, sdt);
    ball.vx *= bf; ball.vy *= bf;
    ball.x += ball.vx * sdt;
    ball.y += ball.vy * sdt;
    player.x += player.vx * sdt;
    player.y += player.vy * sdt;
    // hard cap on chain
    ddx = ball.x - player.x; ddy = ball.y - player.y;
    d2 = Math.sqrt(ddx*ddx + ddy*ddy);
    var maxd = CHAIN_L * CHAIN_MAX;
    if (d2 > maxd){
      nx = ddx / d2; ny = ddy / d2;
      ball.x = player.x + nx * maxd;
      ball.y = player.y + ny * maxd;
      var vout = ball.vx * nx + ball.vy * ny;
      if (vout > 0){ ball.vx -= nx * vout; ball.vy -= ny * vout; }
    }
  }

  // --- arena bounds ---
  player.x = clamp(player.x, A.x + player.r, A.x + A.w - player.r);
  player.y = clamp(player.y, A.y + player.r, A.y + A.h - player.r);
  var bounced = false;
  if (ball.x < A.x + ball.r){ ball.x = A.x + ball.r; ball.vx = Math.abs(ball.vx) * 0.8; bounced = true; }
  if (ball.x > A.x + A.w - ball.r){ ball.x = A.x + A.w - ball.r; ball.vx = -Math.abs(ball.vx) * 0.8; bounced = true; }
  if (ball.y < A.y + ball.r){ ball.y = A.y + ball.r; ball.vy = Math.abs(ball.vy) * 0.8; bounced = true; }
  if (ball.y > A.y + A.h - ball.r){ ball.y = A.y + A.h - ball.r; ball.vy = -Math.abs(ball.vy) * 0.8; bounced = true; }
  var ballSpeed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
  if (bounced && ballSpeed > 160) sfx.clank();

  // --- trail ---
  if (!REDUCED){
    trail.push({ x: ball.x, y: ball.y, hot: ballSpeed > LETHAL });
    if (trail.length > 12) trail.shift();
  }

  // --- combo decay ---
  comboTimer -= dt;
  if (comboTimer <= 0) combo = 1;

  player.inv = Math.max(0, player.inv - dt);

  // --- guards ---
  var spdMul = spotted ? 1.3 : 1;
  var i, g;
  for (i = guards.length - 1; i >= 0; i--){
    g = guards[i];
    g.t += dt;
    g.flash = Math.max(0, g.flash - dt);
    var gdx = player.x - g.x, gdy = player.y - g.y;
    var gd = Math.max(1, Math.sqrt(gdx*gdx + gdy*gdy));
    var seekx = gdx / gd, seeky = gdy / gd;

    if (g.type === "taser"){
      g.cool -= dt;
      if (g.tel > 0){
        g.tel -= dt;
        g.vx *= 0.85; g.vy *= 0.85;
        if (g.tel <= 0){
          var bvx = Math.cos(g.aim) * 250, bvy = Math.sin(g.aim) * 250;
          bolts.push({ x: g.x + Math.cos(g.aim) * (g.r + 6), y: g.y + Math.sin(g.aim) * (g.r + 6), vx: bvx, vy: bvy, r: 5, t: 0 });
          sfx.zap();
          g.cool = 2.4;
        }
      } else if (gd < 270 && g.cool <= 0){
        g.tel = 0.65;
        g.aim = Math.atan2(gdy, gdx);
      } else {
        var want = gd < 170 ? -1 : (gd > 260 ? 1 : 0);
        g.vx = lerp(g.vx, seekx * g.spd * want * spdMul, 3 * dt);
        g.vy = lerp(g.vy, seeky * g.spd * want * spdMul, 3 * dt);
      }
    } else {
      // walker & captain: seek with a little weave
      var weave = Math.sin(g.t * 3) * 0.25;
      var wx = seekx + -seeky * weave, wy = seeky + seekx * weave;
      g.vx = lerp(g.vx, wx * g.spd * spdMul, 4 * dt);
      g.vy = lerp(g.vy, wy * g.spd * spdMul, 4 * dt);
    }

    // separation
    for (var j = 0; j < guards.length; j++){
      if (j === i) continue;
      var o = guards[j];
      var sx = g.x - o.x, sy = g.y - o.y;
      var sd = Math.sqrt(sx*sx + sy*sy);
      var minD = g.r + o.r + 2;
      if (sd > 0.01 && sd < minD){
        g.vx += sx / sd * 60 * dt * 10;
        g.vy += sy / sd * 60 * dt * 10;
      }
    }

    g.x += g.vx * dt;
    g.y += g.vy * dt;

    // ball vs guard
    var bd = dist(ball.x, ball.y, g.x, g.y);
    if (bd < ball.r + g.r){
      if (ballSpeed > LETHAL){
        var dmg = ballSpeed > 700 ? 2 : 1;
        g.hp -= dmg;
        g.flash = 0.12;
        var kn = Math.max(1, bd);
        g.vx += (g.x - ball.x) / kn * 420;
        g.vy += (g.y - ball.y) / kn * 420;
        ball.vx *= 0.8; ball.vy *= 0.8;
        if (g.hp <= 0){ killGuard(g, i); continue; }
        else { sfx.clank(); burst(g.x, g.y, "#9aa3b2", 6, 180); hitstop = 0.02; }
      } else {
        var pn = Math.max(1, bd);
        g.vx += (g.x - ball.x) / pn * 40;
        g.vy += (g.y - ball.y) / pn * 40;
      }
    }

    // guard vs player
    if (dist(g.x, g.y, player.x, player.y) < g.r + player.r){
      hurtPlayer(g.x, g.y);
      var pb = Math.max(1, dist(g.x, g.y, player.x, player.y));
      g.vx -= (player.x - g.x) / pb * 150;
      g.vy -= (player.y - g.y) / pb * 150;
    }
  }

  // --- bolts ---
  for (i = bolts.length - 1; i >= 0; i--){
    var b = bolts[i];
    b.t += dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -40 || b.x > W + 40 || b.y < -40 || b.y > H + 40){ bolts.splice(i, 1); continue; }
    // chain/ball blocks bolts
    if (dist(b.x, b.y, ball.x, ball.y) < b.r + ball.r + 3){
      burst(b.x, b.y, "#7fd4ff", 8, 160);
      popup(b.x, b.y - 12, "BLOCKED", "#7fd4ff");
      sfx.clank();
      bolts.splice(i, 1);
      continue;
    }
    if (player.inv <= 0 && dist(b.x, b.y, player.x, player.y) < b.r + player.r){
      hurtPlayer(b.x, b.y);
      bolts.splice(i, 1);
    }
  }

  // --- pickups ---
  for (i = pickups.length - 1; i >= 0; i--){
    var pk = pickups[i];
    pk.t += dt;
    if (pk.t > 9){ pickups.splice(i, 1); continue; }
    if (dist(pk.x, pk.y, player.x, player.y) < 22){
      player.hp = Math.min(3, player.hp + 1);
      popup(pk.x, pk.y - 14, "+1 HP", "#7dde8b");
      sfx.heart();
      pickups.splice(i, 1);
    }
  }

  // --- particles & popups ---
  for (i = parts.length - 1; i >= 0; i--){
    var p = parts[i];
    p.t += dt;
    if (p.t > p.life){ parts.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= Math.pow(0.02, dt); p.vy *= Math.pow(0.02, dt);
  }
  for (i = popups.length - 1; i >= 0; i--){
    popups[i].t += dt;
    popups[i].y -= 34 * dt;
    if (popups[i].t > 0.9) popups.splice(i, 1);
  }

  shake = Math.max(0, shake - 40 * dt);
  bannerT = Math.max(0, bannerT - dt);
}

// ---------- render ----------
var bgCanvas = null;
function buildBackground(){
  bgCanvas = document.createElement("canvas");
  bgCanvas.width = W; bgCanvas.height = H;
  var g = bgCanvas.getContext("2d");
  // asphalt
  g.fillStyle = "#1a1d23";
  g.fillRect(0, 0, W, H);
  // noise flecks
  var i;
  for (i = 0; i < 900; i++){
    g.fillStyle = Math.random() < 0.5 ? "rgba(255,255,255,0.02)" : "rgba(0,0,0,0.14)";
    g.fillRect(Math.random() * W, Math.random() * H, 2, 2);
  }
  // cracks
  g.strokeStyle = "rgba(0,0,0,0.25)";
  g.lineWidth = 1.5;
  for (i = 0; i < 7; i++){
    g.beginPath();
    var x = rnd(60, W - 60), y = rnd(60, H - 60);
    g.moveTo(x, y);
    for (var k = 0; k < 5; k++){ x += rnd(-50, 50); y += rnd(-35, 35); g.lineTo(x, y); }
    g.stroke();
  }
  // faded basketball court markings
  g.strokeStyle = "rgba(154,163,178,0.16)";
  g.lineWidth = 3;
  g.beginPath(); g.arc(W/2, H/2, 70, 0, Math.PI * 2); g.stroke();
  g.beginPath(); g.moveTo(W/2, A.y); g.lineTo(W/2, A.y + A.h); g.stroke();
  g.beginPath(); g.arc(A.x, H/2, 120, -Math.PI/2, Math.PI/2); g.stroke();
  g.beginPath(); g.arc(A.x + A.w, H/2, 120, Math.PI/2, Math.PI * 1.5); g.stroke();
  // fence
  g.strokeStyle = "#3a4150";
  g.lineWidth = 4;
  g.strokeRect(A.x - 8, A.y - 8, A.w + 16, A.h + 16);
  g.strokeStyle = "rgba(58,65,80,0.5)";
  g.lineWidth = 1;
  for (i = A.x - 8; i < A.x + A.w + 8; i += 14){
    g.beginPath(); g.moveTo(i, A.y - 8); g.lineTo(i + 8, A.y - 2); g.stroke();
    g.beginPath(); g.moveTo(i, A.y + A.h + 8); g.lineTo(i + 8, A.y + A.h + 2); g.stroke();
  }
  // floodlight pools (warm sodium)
  var pool = g.createRadialGradient(W/2, H/2, 60, W/2, H/2, 520);
  pool.addColorStop(0, "rgba(255,184,77,0.07)");
  pool.addColorStop(1, "rgba(255,184,77,0)");
  g.fillStyle = pool;
  g.fillRect(0, 0, W, H);
}
buildBackground();

function drawChain(){
  var dx = ball.x - player.x, dy = ball.y - player.y;
  var d = Math.max(1, Math.sqrt(dx*dx + dy*dy));
  var links = 9;
  var sag = clamp((CHAIN_L - d) * 0.35, 0, 26); // slack sags
  cx.strokeStyle = "#6a7180";
  cx.lineWidth = 2;
  for (var i = 0; i < links; i++){
    var t0 = i / links, t1 = (i + 1) / links;
    var sx = player.x + dx * t0, sy = player.y + dy * t0 + Math.sin(t0 * Math.PI) * sag;
    var ex = player.x + dx * t1, ey = player.y + dy * t1 + Math.sin(t1 * Math.PI) * sag;
    var mx = (sx + ex) / 2, my = (sy + ey) / 2;
    cx.beginPath();
    cx.ellipse(mx, my, 4.5, 2.5, Math.atan2(ey - sy, ex - sx), 0, Math.PI * 2);
    cx.stroke();
  }
}

function drawPlayer(){
  var px = player.x, py = player.y;
  if (player.inv > 0 && Math.floor(player.inv * 12) % 2 === 0) cx.globalAlpha = 0.35;
  // shadow
  cx.fillStyle = "rgba(0,0,0,0.35)";
  cx.beginPath(); cx.ellipse(px, py + 13, 13, 5, 0, 0, Math.PI * 2); cx.fill();
  // striped body (big-head style: small body, big head)
  cx.save();
  cx.translate(px, py);
  cx.fillStyle = "#f2f2ee";
  cx.fillRect(-9, -2, 18, 14);
  cx.fillStyle = "#24262b";
  cx.fillRect(-9, 1, 18, 3.5);
  cx.fillRect(-9, 8, 18, 3.5);
  // head
  cx.fillStyle = "#e8b98a";
  cx.beginPath(); cx.arc(0, -10, 11, 0, Math.PI * 2); cx.fill();
  // beanie
  cx.fillStyle = "#24262b";
  cx.beginPath(); cx.arc(0, -12, 11, Math.PI, 0); cx.fill();
  cx.fillRect(-11, -13, 22, 3);
  // eyes look toward facing
  cx.fillStyle = "#1a1d23";
  cx.beginPath(); cx.arc(player.face * 4, -8, 1.8, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.arc(player.face * 8, -8, 1.8, 0, Math.PI * 2); cx.fill();
  cx.restore();
  cx.globalAlpha = 1;
  // yank cooldown ring
  if (yankCd > 0 && state === "play"){
    cx.strokeStyle = "rgba(154,163,178,0.5)";
    cx.lineWidth = 2;
    cx.beginPath();
    cx.arc(px, py, 22, -Math.PI/2, -Math.PI/2 + (1 - yankCd / 0.6) * Math.PI * 2);
    cx.stroke();
  }
}

function drawBall(){
  var sp = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
  var hot = clamp((sp - LETHAL * 0.7) / (LETHAL * 0.8), 0, 1);
  // trail
  for (var i = 0; i < trail.length; i++){
    var tr = trail[i];
    if (!tr.hot) continue;
    var a = (i / trail.length) * 0.35;
    cx.fillStyle = "rgba(255,210,63," + a.toFixed(3) + ")";
    cx.beginPath(); cx.arc(tr.x, tr.y, ball.r * (0.4 + 0.6 * i / trail.length), 0, Math.PI * 2); cx.fill();
  }
  // shadow
  cx.fillStyle = "rgba(0,0,0,0.35)";
  cx.beginPath(); cx.ellipse(ball.x, ball.y + 10, 11, 4, 0, 0, Math.PI * 2); cx.fill();
  // glow
  if (hot > 0.02){
    var gl = cx.createRadialGradient(ball.x, ball.y, 2, ball.x, ball.y, 34);
    gl.addColorStop(0, "rgba(255,240,180," + (0.55 * hot).toFixed(3) + ")");
    gl.addColorStop(1, "rgba(255,184,77,0)");
    cx.fillStyle = gl;
    cx.beginPath(); cx.arc(ball.x, ball.y, 34, 0, Math.PI * 2); cx.fill();
  }
  // iron ball
  var c1 = hot > 0.6 ? "#fff3cf" : (hot > 0.25 ? "#8d8f97" : "#4b4f58");
  cx.fillStyle = c1;
  cx.beginPath(); cx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = "rgba(255,255,255,0.35)";
  cx.beginPath(); cx.arc(ball.x - 4, ball.y - 4, 3.5, 0, Math.PI * 2); cx.fill();
  cx.strokeStyle = "rgba(0,0,0,0.4)";
  cx.lineWidth = 1.5;
  cx.beginPath(); cx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); cx.stroke();
}

function drawGuard(g){
  cx.save();
  cx.translate(g.x, g.y);
  // shadow
  cx.fillStyle = "rgba(0,0,0,0.35)";
  cx.beginPath(); cx.ellipse(0, g.r * 0.85, g.r * 0.9, g.r * 0.32, 0, 0, Math.PI * 2); cx.fill();
  var body = g.flash > 0 ? "#ffffff" : (g.type === "captain" ? "#2b3d5c" : "#35507a");
  // body
  cx.fillStyle = body;
  cx.fillRect(-g.r * 0.6, -g.r * 0.1, g.r * 1.2, g.r * 0.95);
  // head
  cx.fillStyle = g.flash > 0 ? "#ffffff" : "#e8b98a";
  cx.beginPath(); cx.arc(0, -g.r * 0.45, g.r * 0.62, 0, Math.PI * 2); cx.fill();
  // cap
  cx.fillStyle = g.flash > 0 ? "#ffffff" : "#22344f";
  cx.beginPath(); cx.arc(0, -g.r * 0.55, g.r * 0.62, Math.PI, 0); cx.fill();
  cx.fillRect(-g.r * 0.75, -g.r * 0.6, g.r * 1.5, g.r * 0.18);
  if (g.type === "captain"){
    cx.fillStyle = "#ffd23f";
    cx.fillRect(-g.r * 0.15, -g.r * 0.78, g.r * 0.3, g.r * 0.12);
  }
  cx.restore();
  // taser telegraph
  if (g.type === "taser" && g.tel > 0){
    cx.strokeStyle = "rgba(232,80,58," + (0.25 + 0.5 * Math.abs(Math.sin(tGlobal * 20))).toFixed(3) + ")";
    cx.lineWidth = 2;
    cx.setLineDash([6, 6]);
    cx.beginPath();
    cx.moveTo(g.x, g.y);
    cx.lineTo(g.x + Math.cos(g.aim) * 300, g.y + Math.sin(g.aim) * 300);
    cx.stroke();
    cx.setLineDash([]);
  }
  // captain hp pips
  if (g.type === "captain" && g.hp < 6){
    cx.fillStyle = "#e8503a";
    for (var i = 0; i < g.hp; i++) cx.fillRect(g.x - 18 + i * 6.4, g.y - g.r - 12, 4.5, 4.5);
  }
}

function drawBeams(){
  cx.save();
  cx.globalCompositeOperation = "lighter";
  for (var i = 0; i < towers.length; i++){
    var tw = towers[i];
    var a = towerAngle(tw);
    var spread = 0.10;
    var grad = cx.createLinearGradient(tw.x, tw.y, tw.x + Math.cos(a) * 700, tw.y + Math.sin(a) * 700);
    var hotBeam = spotted && inBeam(tw, player.x, player.y);
    grad.addColorStop(0, hotBeam ? "rgba(232,80,58,0.20)" : "rgba(255,184,77,0.13)");
    grad.addColorStop(1, "rgba(255,184,77,0)");
    cx.fillStyle = grad;
    cx.beginPath();
    cx.moveTo(tw.x, tw.y);
    cx.lineTo(tw.x + Math.cos(a - spread) * 760, tw.y + Math.sin(a - spread) * 760);
    cx.lineTo(tw.x + Math.cos(a + spread) * 760, tw.y + Math.sin(a + spread) * 760);
    cx.closePath();
    cx.fill();
    // tower
    cx.fillStyle = "#3a4150";
    cx.fillRect(tw.x - 6, tw.y - 6, 12, 12);
    cx.fillStyle = "#ffb84d";
    cx.beginPath(); cx.arc(tw.x, tw.y, 3.5, 0, Math.PI * 2); cx.fill();
  }
  cx.restore();
}

function stencil(size){
  cx.font = size + 'px "Saira Stencil One", "Space Grotesk", sans-serif';
}
function grotesk(size, weight){
  cx.font = (weight || 400) + " " + size + 'px "Space Grotesk", sans-serif';
}

function drawHUD(){
  // hearts
  var i;
  for (i = 0; i < 3; i++){
    cx.fillStyle = i < player.hp ? "#e8503a" : "rgba(232,80,58,0.18)";
    var hx = 44 + i * 26, hy = 48;
    cx.beginPath();
    cx.moveTo(hx, hy + 8);
    cx.bezierCurveTo(hx - 11, hy - 3, hx - 5, hy - 12, hx, hy - 4);
    cx.bezierCurveTo(hx + 5, hy - 12, hx + 11, hy - 3, hx, hy + 8);
    cx.fill();
  }
  // score
  cx.textAlign = "right";
  cx.fillStyle = "#f2f2ee";
  stencil(26);
  cx.fillText(String(score), W - 44, 58);
  grotesk(12);
  cx.fillStyle = "#9aa3b2";
  cx.fillText("BEST " + best, W - 44, 74);
  // wave
  cx.textAlign = "center";
  stencil(18);
  cx.fillStyle = "#9aa3b2";
  cx.fillText("WAVE " + wave, W / 2, 56);
  // combo
  if (combo > 1){
    stencil(22);
    cx.fillStyle = "#ffd23f";
    cx.fillText("x" + combo, W / 2, 82);
  }
  // spotted
  if (spotted){
    grotesk(13, 700);
    cx.fillStyle = "rgba(232,80,58," + (0.6 + 0.4 * Math.sin(tGlobal * 10)).toFixed(3) + ")";
    cx.fillText("S P O T T E D", W / 2, H - 40);
    cx.strokeStyle = "rgba(232,80,58,0.35)";
    cx.lineWidth = 6;
    cx.strokeRect(A.x - 4, A.y - 4, A.w + 8, A.h + 8);
  }
  cx.textAlign = "left";
}

function dimScreen(a){
  cx.fillStyle = "rgba(10,12,16," + a + ")";
  cx.fillRect(0, 0, W, H);
}

function drawTitle(){
  dimScreen(0.72);
  cx.textAlign = "center";
  stencil(64);
  cx.fillStyle = "#f2f2ee";
  cx.fillText("SWINGSHANK", W/2, 200);
  grotesk(16, 500);
  cx.fillStyle = "#ffb84d";
  cx.fillText("The ball and chain is your sentence — and your weapon.", W/2, 240);
  grotesk(15);
  cx.fillStyle = "#c9cfda";
  cx.fillText("Run with arrows or WASD. The iron ball drags behind you.", W/2, 300);
  cx.fillText("Swing it fast enough and it glows — that's when it flattens guards.", W/2, 326);
  cx.fillText("Press Space to yank the chain for a sudden whip.", W/2, 352);
  cx.fillText("The ball blocks taser bolts. Searchlights make guards faster.", W/2, 378);
  stencil(24);
  cx.fillStyle = Math.sin(tGlobal * 4) > 0 ? "#ffd23f" : "#9aa3b2";
  cx.fillText("PRESS ENTER", W/2, 450);
  grotesk(12);
  cx.fillStyle = "#5c6472";
  cx.fillText("best " + best, W/2, 486);
  cx.textAlign = "left";
}

function drawOver(){
  overT += 1/60;
  dimScreen(Math.min(0.75, overT * 1.5));
  cx.textAlign = "center";
  stencil(56);
  cx.fillStyle = "#e8503a";
  cx.fillText("CAUGHT", W/2, 230);
  grotesk(18, 500);
  cx.fillStyle = "#f2f2ee";
  cx.fillText("Wave " + wave + "  ·  " + kills + " guards down  ·  Score " + score, W/2, 285);
  grotesk(15);
  cx.fillStyle = score >= best && score > 0 ? "#ffd23f" : "#9aa3b2";
  cx.fillText(score >= best && score > 0 ? "NEW BEST" : "Best " + best, W/2, 318);
  stencil(22);
  cx.fillStyle = Math.sin(tGlobal * 4) > 0 ? "#ffd23f" : "#9aa3b2";
  cx.fillText("PRESS R TO RIOT AGAIN", W/2, 400);
  cx.textAlign = "left";
}

function render(){
  cx.save();
  if (shake > 0 && !REDUCED){
    cx.translate(rnd(-shake, shake) * 0.5, rnd(-shake, shake) * 0.5);
  }
  cx.drawImage(bgCanvas, 0, 0);
  drawBeams();

  var i;
  // pickups
  for (i = 0; i < pickups.length; i++){
    var pk = pickups[i];
    var bob = Math.sin(pk.t * 4) * 3;
    var fade = pk.t > 7 ? (Math.floor(pk.t * 8) % 2 === 0 ? 0.3 : 1) : 1;
    cx.globalAlpha = fade;
    cx.fillStyle = "#7dde8b";
    var hx = pk.x, hy = pk.y + bob;
    cx.beginPath();
    cx.moveTo(hx, hy + 7);
    cx.bezierCurveTo(hx - 10, hy - 3, hx - 4, hy - 11, hx, hy - 3);
    cx.bezierCurveTo(hx + 4, hy - 11, hx + 10, hy - 3, hx, hy + 7);
    cx.fill();
    cx.globalAlpha = 1;
  }
  // bolts
  for (i = 0; i < bolts.length; i++){
    var b = bolts[i];
    cx.fillStyle = "#7fd4ff";
    cx.beginPath(); cx.arc(b.x, b.y, b.r, 0, Math.PI * 2); cx.fill();
    cx.strokeStyle = "rgba(127,212,255,0.4)";
    cx.lineWidth = 2;
    cx.beginPath();
    cx.moveTo(b.x - b.vx * 0.05, b.y - b.vy * 0.05);
    cx.lineTo(b.x, b.y);
    cx.stroke();
  }
  for (i = 0; i < guards.length; i++) drawGuard(guards[i]);
  drawChain();
  drawPlayer();
  drawBall();
  // particles
  for (i = 0; i < parts.length; i++){
    var p = parts[i];
    cx.globalAlpha = 1 - p.t / p.life;
    cx.fillStyle = p.c;
    cx.fillRect(p.x - p.r/2, p.y - p.r/2, p.r, p.r);
  }
  cx.globalAlpha = 1;
  // popups
  for (i = 0; i < popups.length; i++){
    var po = popups[i];
    cx.globalAlpha = 1 - po.t / 0.9;
    grotesk(14, 700);
    cx.textAlign = "center";
    cx.fillStyle = po.c;
    cx.fillText(po.text, po.x, po.y);
    cx.globalAlpha = 1;
  }
  cx.textAlign = "left";

  if (state === "play" || state === "pause" || state === "over") drawHUD();

  // wave banner
  if (bannerT > 0 && state === "play"){
    var ba = Math.min(1, bannerT / 0.4);
    cx.globalAlpha = ba;
    cx.textAlign = "center";
    stencil(48);
    cx.fillStyle = "#ffb84d";
    cx.fillText(bannerText, W/2, H/2 - 40);
    cx.globalAlpha = 1;
    cx.textAlign = "left";
  }

  if (state === "title") drawTitle();
  if (state === "over") drawOver();
  if (state === "pause"){
    dimScreen(0.55);
    cx.textAlign = "center";
    stencil(40);
    cx.fillStyle = "#f2f2ee";
    cx.fillText("PAUSED", W/2, H/2);
    grotesk(14);
    cx.fillStyle = "#9aa3b2";
    cx.fillText("press P to resume", W/2, H/2 + 34);
    cx.textAlign = "left";
  }
  if (muted){
    grotesk(12);
    cx.fillStyle = "#5c6472";
    cx.fillText("muted (M)", 34, H - 34);
  }
  cx.restore();
}

// ---------- main loop ----------
var last = performance.now();
function frame(now){
  var dt = Math.min(1/30, (now - last) / 1000);
  last = now;

  if (tapped("mute")) muted = !muted;

  if (state === "title"){
    tGlobal += dt;
    if (tapped("enter") || tapped("restart")){ reset(); state = "play"; }
  } else if (state === "play"){
    if (tapped("pause")) state = "pause";
    else update(dt);
  } else if (state === "pause"){
    if (tapped("pause") || tapped("enter")) state = "play";
  } else if (state === "over"){
    tGlobal += dt;
    if (tapped("restart") || tapped("enter")){ reset(); state = "play"; }
  }
  // clear one-shot keys not consumed this frame
  pressedOnce = {};

  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

})();
</script>
</body>
