<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Arthur Conmy</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="theme-color" content="#001f3d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #07172b;
            --orange: #ff6b35;
            --blue: #003161;
        }

        body {
            min-height: 100svh;
            font-family: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            background: var(--ink);
        }

        a {
            color: inherit;
        }

        .site-nav {
            position: fixed;
            z-index: 20;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 44px;
            color: white;
        }

        .site-nav::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(7, 23, 43, 0.72);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(14px);
            pointer-events: none;
        }

        .brand,
        .nav-links {
            position: relative;
            z-index: 1;
        }

        .brand {
            text-decoration: none;
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 0;
        }

        .brand span {
            color: var(--orange);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .nav-links a,
        .nav-links button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.88);
            text-decoration: none;
        }

        .nav-links button {
            border: 0;
            padding: 0;
            background: transparent;
            font: inherit;
            cursor: pointer;
        }

        .external-icon,
        .copy-icon {
            width: 0.9em;
            height: 0.9em;
            flex: 0 0 auto;
        }

        main {
            position: relative;
            display: grid;
            min-height: 100svh;
            align-items: end;
            overflow: hidden;
            padding: 138px 48px 72px;
        }

        main::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(90deg, rgba(7, 23, 43, 0.88) 0%, rgba(7, 23, 43, 0.62) 48%, rgba(7, 23, 43, 0.18) 100%),
                linear-gradient(0deg, rgba(7, 23, 43, 0.82) 0%, rgba(7, 23, 43, 0.06) 54%),
                url("/assets/HKpGPRYXUAAoRbB.jpg");
            background-size: cover;
            background-position: 52% center;
        }

        .not-found {
            position: relative;
            z-index: 1;
            max-width: 760px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            font-family: "JetBrains Mono", monospace;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 36px;
            height: 3px;
            background: var(--orange);
            border-radius: 999px;
        }

        h1 {
            max-width: 720px;
            font-size: clamp(4.2rem, 16vw, 9rem);
            line-height: 0.9;
            letter-spacing: 0;
            font-weight: 800;
        }

        p {
            max-width: 620px;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.86);
            font-size: clamp(1.1rem, 2.2vw, 1.45rem);
            line-height: 1.55;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 34px;
        }

        .button {
            appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 50px;
            padding: 0 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            color: white;
            text-decoration: none;
            font: inherit;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .button.primary {
            border-color: var(--orange);
            background: var(--orange);
        }

        .button svg {
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
        }

        .button[data-copied="true"] {
            border-color: rgba(255, 255, 255, 0.65);
        }

        @media (max-width: 760px) {
            .site-nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                padding: 16px 24px;
            }

            .nav-links {
                width: 100%;
                justify-content: flex-start;
                gap: 18px;
                font-size: 0.84rem;
                flex-wrap: wrap;
            }

            main {
                min-height: max(760px, 100svh);
                padding: 154px 24px 46px;
            }

            main::before {
                background-position: 46% center;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <a class="brand" href="/">Arthur<span>Conmy</span></a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/#work">Work</a></li>
            <li><a href="https://scholar.google.com/citations?user=n4HIyXQAAAAJ" target="_blank" rel="noreferrer">Research <svg class="external-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14 3h7v7h-2V6.4l-9.3 9.3-1.4-1.4L17.6 5H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></svg></a></li>
            <li><button type="button" data-copy-email aria-label="Copy email address"><span data-copy-label>Email</span> <svg class="copy-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2V7Zm2 0v10h8V7h-8ZM4 3h10v2H6v10H4V3Z"/></svg></button></li>
            <li><a href="https://www.admonymous.co/arthur-conmy" target="_blank" rel="noreferrer">Feedback <svg class="external-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14 3h7v7h-2V6.4l-9.3 9.3-1.4-1.4L17.6 5H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></svg></a></li>
        </ul>
    </nav>

    <main>
        <section class="not-found" aria-labelledby="not-found-title">
            <span class="eyebrow">Page not found</span>
            <h1 id="not-found-title">404</h1>
            <p>The requested page could not be found. The homepage has the current research, role, links, and contact details.</p>
            <div class="actions">
                <a class="button primary" href="/">Go Home</a>
                <a class="button" href="https://scholar.google.com/citations?user=n4HIyXQAAAAJ" target="_blank" rel="noreferrer">
                    Scholar
                    <svg class="external-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14 3h7v7h-2V6.4l-9.3 9.3-1.4-1.4L17.6 5H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></svg>
                </a>
                <button class="button" type="button" data-copy-email aria-label="Copy email address">
                    <svg class="copy-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2V7Zm2 0v10h8V7h-8ZM4 3h10v2H6v10H4V3Z"/></svg>
                    <span data-copy-label>Email</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        (function () {
            var emailAddress = "arthurconmy@gmail.com";

            function fallbackCopyEmail() {
                var textarea = document.createElement("textarea");
                textarea.value = emailAddress;
                textarea.setAttribute("readonly", "");
                textarea.style.position = "fixed";
                textarea.style.opacity = "0";
                document.body.appendChild(textarea);
                textarea.select();

                var copied = false;
                try {
                    copied = document.execCommand("copy");
                } catch (error) {
                    copied = false;
                }

                document.body.removeChild(textarea);
                return copied;
            }

            function markEmailCopied(button, copied) {
                var label = button.querySelector("[data-copy-label]");

                if (!label) {
                    return;
                }

                var defaultLabel = button.getAttribute("data-default-label") || label.textContent;
                button.setAttribute("data-default-label", defaultLabel);
                button.setAttribute("data-copied", "true");
                label.textContent = copied ? "Copied" : emailAddress;

                window.setTimeout(function () {
                    label.textContent = defaultLabel;
                    button.removeAttribute("data-copied");
                }, 1800);
            }

            document.querySelectorAll("[data-copy-email]").forEach(function (button) {
                button.addEventListener("click", function () {
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(emailAddress).then(function () {
                            markEmailCopied(button, true);
                        }).catch(function () {
                            markEmailCopied(button, fallbackCopyEmail());
                        });
                        return;
                    }

                    markEmailCopied(button, fallbackCopyEmail());
                });
            });
        }());
    </script>
</body>
</html>
